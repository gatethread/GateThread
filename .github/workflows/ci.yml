# CI — runs on every pull request and every push to main
#
# Steps (in order — each must pass before the next runs):
#   1. ruff check    — lint: catches style errors, unused imports, security issues
#   2. ruff format   — format: fails if any file would be reformatted (enforces consistency)
#   3. pytest        — tests: runs the full test suite
#   4. pip-audit     — security: fails if any dependency has a known critical CVE
#
# A PR cannot be merged until all four steps are green.

name: CI

on:
  pull_request:           # Run on every PR (any branch → any branch)
    branches: ["**"]
  push:
    branches: ["main"]    # Also run on direct pushes to main

jobs:
  ci:
    name: Lint, Test, Audit
    runs-on: ubuntu-latest  # Fresh Ubuntu VM provided by GitHub

    steps:
      # -----------------------------------------------------------------------
      # 1. Check out the repository
      # -----------------------------------------------------------------------
      # This clones the repo into the VM so subsequent steps can read the files.
      # "fetch-depth: 1" means only clone the latest commit — faster than a full history.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # -----------------------------------------------------------------------
      # 2. Set up Python
      # -----------------------------------------------------------------------
      # Installs the exact Python version we require. The version comes from
      # .python-version in the repo root — no duplication.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"  # Reads our .python-version file

      # -----------------------------------------------------------------------
      # 3. Cache pip dependencies
      # -----------------------------------------------------------------------
      # If pyproject.toml hasn't changed since the last run, restore packages
      # from cache instead of re-downloading. Saves 1-3 minutes per run.
      # The cache key includes the OS and a hash of pyproject.toml — if either
      # changes, the cache is invalidated and packages are re-downloaded fresh.
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # -----------------------------------------------------------------------
      # 4. Install dependencies
      # -----------------------------------------------------------------------
      # `pip install -e ".[dev]"` installs:
      #   - The llmgate package itself (editable mode)
      #   - All runtime dependencies from [project.dependencies]
      #   - All dev dependencies from [project.optional-dependencies.dev]
      #     including ruff, pytest, pytest-asyncio, and pip-audit
      - name: Install dependencies
        run: pip install -e ".[dev]"

      # -----------------------------------------------------------------------
      # 5. Ruff — lint check
      # -----------------------------------------------------------------------
      # `ruff check .` scans all Python files against the rules in pyproject.toml.
      # Rules include: style (E/W), unused imports (F), import order (I),
      # modern syntax (UP), common bugs (B), and security patterns (S).
      # Exit code is non-zero if any violations are found — CI fails.
      - name: Lint (ruff check)
        run: ruff check .

      # -----------------------------------------------------------------------
      # 6. Ruff — format check
      # -----------------------------------------------------------------------
      # `ruff format --check .` does NOT reformat files — it only checks whether
      # any file WOULD be reformatted. If yes, it exits non-zero and CI fails.
      # This enforces that all committed code is already formatted.
      # To fix locally: run `ruff format .` before committing.
      - name: Format check (ruff format)
        run: ruff format --check .

      # -----------------------------------------------------------------------
      # 7. Pytest — test suite
      # -----------------------------------------------------------------------
      # Runs the full test suite. Configuration comes from [tool.pytest.ini_options]
      # in pyproject.toml: testpaths=["tests"], asyncio_mode="auto", -v --tb=short.
      # Exit code is non-zero if any test fails or errors — CI fails.
      - name: Test (pytest)
        run: pytest

      # -----------------------------------------------------------------------
      # 8. pip-audit — dependency security scan
      # -----------------------------------------------------------------------
      # Checks every installed package against the PyPI advisory database (OSV).
      # `--strict` means: fail on any vulnerability severity, not just critical.
      # `--fix` is NOT used here — we want CI to flag the issue, not silently patch it.
      # If a vulnerability is found: update the package version in pyproject.toml
      # and open a PR with the fix.
      - name: Security audit (pip-audit)
        run: pip-audit --strict --skip-editable
