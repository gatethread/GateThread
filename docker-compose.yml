# GateThread — Local Development Stack
#
# Starts PostgreSQL (with pgvector) and Redis.
# The FastAPI app is NOT run here — start it separately with:
#   uvicorn app.main:app --reload
#
# Usage:
#   docker compose up -d       # start in background
#   docker compose down        # stop and remove containers (data persists in volumes)
#   docker compose down -v     # stop and delete all data (full reset)

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL + pgvector
  # Primary database: sessions, memory chunks, audit log, vector embeddings
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:0.8.0-pg16   # PostgreSQL 16 with pgvector 0.8.0 (official image)
    container_name: GateThread-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: GateThread
      POSTGRES_USER: GateThread
      POSTGRES_PASSWORD: GateThread  # Local dev only — never use this in production

    ports:
      # Expose PostgreSQL on localhost:5432 so the app and migrations can connect.
      # The app connects using: postgresql+asyncpg://GateThread:GateThread@localhost:5432/GateThread
      - "127.0.0.1:5432:5432"     # Bound to 127.0.0.1 — not accessible from outside the machine

    volumes:
      # Named volume: data survives docker compose down / up cycles
      - pgdata:/var/lib/postgresql/data

    healthcheck:
      # pg_isready checks if PostgreSQL is accepting connections — not just "process started"
      # This prevents a race condition where our app connects before the DB is ready
      test: ["CMD-SHELL", "pg_isready -U GateThread -d GateThread"]
      interval: 5s     # Check every 5 seconds
      timeout: 5s      # Fail if no response within 5 seconds
      retries: 10      # Give up after 10 failures (50 seconds total)
      start_period: 10s  # Don't start checking for 10 seconds after container starts

  # ---------------------------------------------------------------------------
  # Redis
  # Session transcript buffer — ephemeral by design, no disk persistence
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine          # Alpine = minimal image (~30MB vs ~100MB for full image)
    container_name: GateThread-redis
    restart: unless-stopped

    ports:
      # Expose Redis on localhost:6379
      - "127.0.0.1:6379:6379"     # Bound to 127.0.0.1 — not accessible from outside

    command:
      - redis-server
      - "--save"
      - ""
      - "--appendonly"
      - "no"
      - "--maxmemory"
      - "512mb"
      - "--maxmemory-policy"
      - "allkeys-lru"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]  # redis-cli ping returns PONG if Redis is alive
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

# ---------------------------------------------------------------------------
# Volumes
# ---------------------------------------------------------------------------
volumes:
  pgdata:
    # This named volume is managed by Docker. Data lives at:
    #   /var/lib/docker/volumes/GateThread_pgdata/_data (on Linux/Mac)
    # Run `docker compose down -v` to delete it (full reset).
